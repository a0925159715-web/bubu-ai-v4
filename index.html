
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bubu AI V5.1</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f3f4f6;padding:20px;color:#111827}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:#fff;border-radius:24px;padding:24px;margin-bottom:20px}
textarea,input,select{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:12px;margin-top:8px}
textarea{min-height:120px}
button{border:0;border-radius:14px;padding:14px 18px;font-weight:700;cursor:pointer}
.ai{width:100%;margin-top:14px;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff}
.copy{width:100%;margin-top:14px;background:#111827;color:#fff}
.green{width:100%;margin-top:14px;background:#059669;color:#fff}
.preview{background:#faf5ff;border:1px solid #e9d5ff;border-radius:18px;padding:18px;white-space:pre-wrap;line-height:1.8}
.priceGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:18px}
.priceBox{background:#f8fafc;padding:18px;border-radius:18px;text-align:center}
.priceBox h3{margin:0;font-size:14px;color:#64748b}
.priceBox div{font-size:28px;font-weight:900;margin-top:8px}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #e5e7eb;text-align:left}
.status{padding:6px 10px;border-radius:999px;background:#fef3c7;font-size:12px;font-weight:700}
.done{background:#dcfce7}
@media(max-width:900px){.grid,.priceGrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="card">
<h1>🔥 Bubu AI V5.1</h1>
<p>保留原版功能，只把 ③＋④ 合併。</p>
</div>

<div class="grid">

<div class="card">
<h2>① 廠商原文</h2>

<label>廠商代碼</label>
<input id="vendorCode" value="BA">

<label>商品分類</label>
<select id="category">
<option value="auto">AI自動判斷</option>
<option value="clothing">服飾</option>
<option value="skincare">保養品</option>
<option value="life">生活用品</option>
</select>

<label>貼上廠商原文</label>
<textarea id="rawText"></textarea>

<button class="ai" onclick="parseVendor()">✨ AI 自動整理商品</button>

</div>

<div class="card">
<h2>② AI解析結果 / 可微調</h2>

<label>商品名稱</label>
<input id="productName">

<label>顏色</label>
<input id="colors">

<label>規格</label>
<input id="specs">

<label>尺寸</label>
<textarea id="sizeText"></textarea>

<div class="priceGrid">
<div class="priceBox">
<h3>建議售價</h3>
<div id="retail">0</div>
</div>

<div class="priceBox">
<h3>建議批價</h3>
<div id="wholesale">0</div>
</div>

<div class="priceBox">
<h3>成本</h3>
<div id="cost">0</div>
</div>
</div>

<button class="green" onclick="addTask()">加入今日同步工作台</button>

</div>

</div>

<div class="card">
<h2>③ 完整貼文預覽（愛+1＋AI文案合併）</h2>

<div id="fullPost" class="preview">
請先貼廠商原文
</div>

<button class="copy" onclick="copyPost()">
📋 一鍵複製完整貼文
</button>

</div>

<div class="card">
<h2>④ 今日同步工作台</h2>

<table>
<thead>
<tr>
<th>狀態</th>
<th>商品</th>
<th>售價</th>
<th>批價</th>
<th>操作</th>
</tr>
</thead>

<tbody id="taskList"></tbody>

</table>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("bubu_tasks") || "[]");

async function parseVendor(){

 const rawText = document.getElementById("rawText").value;

 const response = await fetch("/api/parse-vendor",{
   method:"POST",
   headers:{
     "Content-Type":"application/json"
   },
   body:JSON.stringify({
     rawText,
     vendorCode:document.getElementById("vendorCode").value
   })
 });

 const data = await response.json();

 document.getElementById("productName").value=data.title;
 document.getElementById("colors").value=data.colors;
 document.getElementById("specs").value=data.specs;
 document.getElementById("sizeText").value=data.sizeText;

 document.getElementById("retail").innerText=data.price;
 document.getElementById("wholesale").innerText=data.wholesale;
 document.getElementById("cost").innerText=data.cost;

 const post = `
${data.title}

顏色：${data.colors}
規格：${data.specs}
價格：${data.price}

📏 尺寸（平量cm）
${data.sizeText}

——————————

${data.copy}

Hashtag：
${data.hashtags}
`;

 document.getElementById("fullPost").innerText = post;

}

function copyPost(){

 navigator.clipboard.writeText(
   document.getElementById("fullPost").innerText
 );

 alert("已複製完整貼文");

}

function addTask(){

 const item = {
   title:document.getElementById("productName").value,
   retail:document.getElementById("retail").innerText,
   wholesale:document.getElementById("wholesale").innerText,
   done:false
 };

 tasks.unshift(item);

 localStorage.setItem("bubu_tasks",JSON.stringify(tasks));

 renderTasks();

}

function toggleTask(index){

 tasks[index].done = !tasks[index].done;

 localStorage.setItem("bubu_tasks",JSON.stringify(tasks));

 renderTasks();

}

function renderTasks(){

 document.getElementById("taskList").innerHTML = tasks.map((t,i)=>`

<tr>
<td>
<span class="status ${t.done ? 'done' : ''}">
${t.done ? '✅ 已同步' : '⏳ 未同步'}
</span>
</td>

<td>${t.title}</td>

<td>${t.retail}</td>

<td>${t.wholesale}</td>

<td>
<button onclick="toggleTask(${i})">
✔
</button>
</td>

</tr>

`).join("");

}

renderTasks();

</script>

</body>
</html>
