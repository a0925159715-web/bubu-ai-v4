
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bubu AI V5 TEST V2</title>
<style>
body{font-family:Arial;background:#f3f4f6;margin:0;padding:20px;color:#111}
.card{background:#fff;border-radius:20px;padding:20px;margin-bottom:20px}
textarea,input,select{width:100%;padding:12px;border-radius:12px;border:1px solid #ccc;margin-top:8px}
textarea{min-height:120px}
button{padding:14px 18px;border:0;border-radius:14px;font-weight:700;cursor:pointer}
.ai{background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;width:100%;margin-top:12px}
.copy{background:#111827;color:#fff;width:100%;margin-top:12px}
.preview{background:#faf5ff;border:1px solid #e9d5ff;padding:18px;border-radius:18px;white-space:pre-wrap;line-height:1.8}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="card">
<h1>🔥 Bubu AI V5 TEST V2</h1>
<p>愛+1＋AI文案合併版</p>
</div>

<div class="grid">

<div class="card">
<h2>① 廠商原文</h2>

<label>廠商代碼</label>
<input id="vendorCode" value="BA">

<label>商品分類</label>
<select id="category">
<option value="auto">AI自動判斷</option>
<option value="clothing">服飾</option>
<option value="skincare">保養品</option>
<option value="life">生活用品</option>
</select>

<label>貼上廠商原文</label>
<textarea id="rawText"></textarea>

<button class="ai" onclick="parseVendor()">✨ AI 自動整理商品</button>

</div>

<div class="card">
<h2>② 完整貼文預覽</h2>

<div id="fullPost" class="preview">
請先貼廠商原文
</div>

<button class="copy" onclick="copyFullPost()">
📋 一鍵複製完整貼文
</button>

</div>

</div>

<script>

async function parseVendor(){

 const rawText=document.getElementById("rawText").value;

 const response=await fetch("/api/parse-vendor",{
   method:"POST",
   headers:{
     "Content-Type":"application/json"
   },
   body:JSON.stringify({
     rawText,
     vendorCode:document.getElementById("vendorCode").value,
     category:document.getElementById("category").value
   })
 });

 const data=await response.json();

 const fullText=`
${data.title}

顏色：${data.colors}
規格：${data.specs}
價格：${data.price}

📏 尺寸（平量cm）
${data.sizeText}

——————————

${data.copy}

Hashtag：
${data.hashtags}
`;

 document.getElementById("fullPost").innerText=fullText;

}

function copyFullPost(){

 navigator.clipboard.writeText(
   document.getElementById("fullPost").innerText
 );

 alert("已複製完整貼文");

}

</script>

</body>
</html>
