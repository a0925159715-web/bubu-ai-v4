<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Bubu AI V6.5｜原價/VIP/VVIP・愛+1匯入</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',Arial,sans-serif;background:#f3f4f6;color:#0f172a}.wrap{max-width:1320px;margin:0 auto;padding:22px}.card{background:#fff;border-radius:24px;padding:24px;margin-bottom:20px;box-shadow:0 14px 35px rgba(15,23,42,.09)}h1{margin:0 0 8px;font-size:32px;font-weight:900}h2{margin:0 0 16px;font-size:24px;font-weight:900}p{margin:0;color:#64748b;line-height:1.7}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}label{display:block;margin:14px 0 7px;font-weight:900}input,select,textarea{width:100%;border:1px solid #d8e0ed;border-radius:15px;padding:13px 14px;font-size:16px;font-family:inherit;outline:none;background:#fff}textarea{min-height:110px;resize:vertical;line-height:1.6}.raw{min-height:260px}.btn{width:100%;border:0;border-radius:16px;padding:15px 18px;margin-top:14px;background:#111827;color:#fff;font-size:17px;font-weight:900;cursor:pointer}.btn.ai{background:linear-gradient(135deg,#7c3aed,#ec4899)}.btn.gray{background:#475569}.btn.small{width:auto;padding:9px 12px;margin:0;font-size:14px;border-radius:11px}.btn.red{background:#991b1b}.priceGrid,.grid2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:16px}.mini{border-radius:18px;padding:18px;background:#f8fafc;text-align:center}.mini .k{font-size:13px;color:#64748b;font-weight:900}.mini .v{font-size:28px;font-weight:900;margin-top:4px}.preview{white-space:pre-wrap;background:#faf5ff;border:1px solid #e9d5ff;border-radius:18px;padding:18px;line-height:1.8;min-height:250px}table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden}th,td{border-bottom:1px solid #e5e7eb;padding:12px;text-align:left;vertical-align:top;font-size:14px}th{background:#f8fafc;font-weight:900}.pill{display:inline-block;border-radius:999px;padding:6px 10px;background:#fef3c7;color:#92400e;font-size:12px;font-weight:900}.done{background:#dcfce7;color:#166534}.hidden{display:none}.cloud{display:inline-block;margin-top:10px;background:#dcfce7;color:#166534;padding:7px 12px;border-radius:999px;font-weight:900;font-size:13px}.cloud.bad{background:#fee2e2;color:#991b1b}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}.checkCell{width:34px}.editableMini input{font-size:22px;font-weight:900;text-align:center}.noteBox{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:16px;white-space:pre-wrap;line-height:1.7}@media(max-width:900px){.wrap{padding:12px}.grid,.grid2,.priceGrid{grid-template-columns:1fr}h1{font-size:26px}}</style></head><body><div class="wrap"><div class="card"><h1>☁️ Bubu AI V6.5｜AI營運工作台</h1><p>手機 / 電腦同步版。V6.5：原價/VIP/VVIP、AI市場價格提醒、愛+1 Excel 匯出。</p><span id="cloudStatus" class="cloud">雲端連線中...</span></div><div class="grid"><div class="card"><h2>① 廠商原文</h2><label>廠商代碼</label><input id="vendorCode" value="BY"/><label>成本模式</label><select id="mode" onchange="updateAll()"><option value="taiwan">台灣 / 五分埔 NT成本</option><option value="korea">韓國 / S成本</option></select><label>商品分類</label><select id="category" onchange="parsedCategory=this.value==='auto'?parsedCategory:this.value;updateAll()"><option value="auto">AI自動判斷</option><option value="clothing">服飾</option><option value="skincare">保養品 / 彩妝</option><option value="life">生活用品</option></select><label>貼上廠商原文</label><textarea id="rawText" class="raw"></textarea><label><input id="autoAdd" type="checkbox" checked style="width:auto"/> AI整理完成後，自動加入雲端同步工作台</label><button id="parseBtn" class="btn ai" onclick="parseVendor()">✨ AI 自動整理商品</button></div><div class="card"><h2>② AI解析結果 / 可微調</h2><label>商品名稱</label><input id="productName" oninput="updateAll()"/><div id="clothingCostBox"><label>服飾成本 / 拿貨價</label><input id="clothingCost" type="number" oninput="updateAll()"/></div><div id="skincareCostBox" class="hidden"><label>保養品拿貨價</label><input id="skincareCost" type="number" oninput="updateAll()"/></div><div id="clothingFields"><label>顏色</label><input id="colors" oninput="updateAll()"/><label>規格</label><input id="specs" value="F" oninput="updateAll()"/><label>尺寸 / 規格補充</label><textarea id="sizeText" oninput="updateAll()"></textarea></div><div id="skincareFields" class="hidden"><label>容量 / 規格</label><input id="capacity" oninput="updateAll()"/><label>中文標籤｜用途</label><input id="labelPurpose" oninput="updateAll()"/><label>中文標籤｜保存期限</label><input id="labelExpiry" value="詳見產品外盒" oninput="updateAll()"/><label>中文標籤｜責任業者</label><input id="labelCompany" value="布布韓國工作室" oninput="updateAll()"/><label>中文標籤｜聯絡方式</label><input id="labelContact" value="@bubukorea" oninput="updateAll()"/><label>中文標籤｜產地</label><input id="labelOrigin" value="韓國" oninput="updateAll()"/><label>中文標籤｜使用方式 / 注意事項補充</label><textarea id="labelUsage" oninput="updateAll()"></textarea></div><div class="priceGrid">
<div class="mini"><div class="k">計價進價</div><div id="landed" class="v">0</div></div>
<div class="mini editableMini"><div class="k">原價</div><input id="manualRetail" type="number" oninput="updateAll()" placeholder="原價"/></div>
<div class="mini editableMini"><div class="k">VIP</div><input id="manualVip" type="number" oninput="updateAll()" placeholder="VIP"/></div>
</div>
<div class="priceGrid">
<div class="mini editableMini"><div class="k">VVIP</div><input id="manualVvip" type="number" oninput="updateAll()" placeholder="VVIP"/></div>
<div class="mini"><div class="k">公式原價</div><div id="retail" class="v">0</div></div>
<div class="mini"><div class="k">公式VVIP</div><div id="wholesale" class="v">0</div></div>
</div>
<label>價格備註 / 市場參考</label><input id="priceNote" placeholder="例如：市場價偏低，原價先保守" oninput="updateAll()"/>
<div class="toolbar"><button class="btn gray" onclick="checkMarketPrice()">🔍 AI偵測外面售價</button></div>
<div id="marketBox" class="noteBox">尚未查詢市場價格。</div></div></div><div class="card"><h2>③ 完整貼文預覽</h2><div id="fullPost" class="preview">請先貼廠商原文，按「AI 自動整理商品」。</div><button class="btn gray" onclick="copyPost()">📋 一鍵複製完整貼文</button></div><div id="labelCard" class="card hidden"><h2>④ 保養品中文標籤</h2><div id="labelPreview" class="preview"></div><button class="btn gray" onclick="copyLabel()">🏷️ 複製中文標籤</button></div><div class="card"><h2>⑤ 雲端同步工作台</h2><div class="toolbar"><button class="btn gray" onclick="toggleAllSelected(true)">全選</button><button class="btn gray" onclick="toggleAllSelected(false)">全不選</button><button class="btn ai" onclick="exportAiplusExcel()">📤 輸出愛+1 Excel</button></div><table><thead><tr><th>選</th><th>狀態</th><th>商品</th><th>原價</th><th>VIP</th><th>VVIP</th><th>成本</th><th>動作</th></tr></thead><tbody id="taskBody"></tbody></table></div></div><script>
const SUPABASE_URL='https://xkjayekdbezakvnyjvwu.supabase.co';
const SUPABASE_KEY='sb_publishable_6arvG__i8D6QAuP3MgV_7A_cmjmxzg_';
const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let currentCopy='',parsedCategory='clothing',lastAutoAddedKey='',tasks=[],currentEditingId=null,autoSaveTimer=null;
const get=id=>document.getElementById(id),val=id=>get(id).value.trim(),set=(id,v)=>get(id).value=v||'';
const ceil10=n=>Math.ceil((Number(n)||0)/10)*10,money=n=>'NT$'+Math.round(Number(n)||0).toLocaleString();
function cloud(text,ok=true){get('cloudStatus').textContent=text;get('cloudStatus').classList.toggle('bad',!ok)}
function cleanText(v,mode='line'){let t=String(v||'').replace(/\\n/g,'\n').replace(/\r\n/g,'\n');return mode==='space'?t.replace(/\s+/g,' ').trim():t.replace(/\n{3,}/g,'\n\n').trim()}
function detectCategory(){const s=val('category');return s!=='auto'?s:(parsedCategory||'clothing')}function getCost(){return Number(detectCategory()==='skincare'?val('skincareCost'):val('clothingCost'))||0}
function calcPrices(){const mode=val('mode'),cat=detectCategory(),cost=getCost();let landed=0;if(mode==='taiwan'){landed=cost+10}else{landed=Math.ceil(cost*1.27)}let retail=ceil10((landed+54)/0.85);let vip=ceil10((landed+47)/0.81);let vvip=ceil10((landed+40)/0.8);const mr=get('manualRetail')?Number(val('manualRetail')):0;const mv=get('manualVip')?Number(val('manualVip')):0;const mw=get('manualVvip')?Number(val('manualVvip')):0;if(mr>0)retail=mr;if(mv>0)vip=mv;if(mw>0)vvip=mw;return{landed,retail,vip,vvip,wholesale:vvip,cost,cat}}
function switchMode(){const skin=detectCategory()==='skincare';get('clothingFields').classList.toggle('hidden',skin);get('clothingCostBox').classList.toggle('hidden',skin);get('skincareFields').classList.toggle('hidden',!skin);get('skincareCostBox').classList.toggle('hidden',!skin);get('labelCard').classList.toggle('hidden',!skin)}
function updateAll(){const p=calcPrices();get('landed').textContent=money(p.landed);get('retail').textContent=money(p.retail);get('wholesale').textContent=money(p.vvip);switchMode();const vendor=val('vendorCode'),name=val('productName'),title=vendor&&name&&!name.startsWith(vendor+'｜')?vendor+'｜'+name:(name||''),copy=cleanText(currentCopy)||'文案生成中或尚未生成。';let full='';if(p.cat==='skincare'){const cap=val('capacity')||'依實際包裝標示';full=`${title}\n\n價格：${p.retail}\n規格：${cap}\n\n——————————\n\n${copy}`;updateLabelPreview(title)}else{const colors=val('colors')||'單一色',specs=val('specs')||'F',size=cleanText(val('sizeText'));full=`${title}\n\n顏色：${colors}\n規格：${specs}\n價格：${p.retail}\n\n${size?'📏 尺寸（平量cm）\n'+size+'\n':''}——————————\n\n${copy}`}get('fullPost').textContent=cleanText(full);if(currentEditingId)scheduleAutoSync()}
function updateLabelPreview(title){get('labelPreview').textContent=cleanText(`${title||val('productName')}\n${val('capacity')||'依實際包裝標示'}｜${val('labelOrigin')||'韓國'}\n用途：${val('labelPurpose')||'日常保養／清潔使用'}\n保存期限：${val('labelExpiry')||'詳見產品外盒'}\n責任業者：${val('labelCompany')||'布布韓國工作室'}\n聯絡方式：${val('labelContact')||'@bubukorea'}${val('labelUsage')?'\n\n'+cleanText(val('labelUsage')):''}`)}
async function parseVendor(){const rawText=val('rawText');if(!rawText){alert('請先貼上廠商原文');return}const btn=get('parseBtn');btn.disabled=true;btn.textContent='AI整理中...';try{const res=await fetch('/api/parse-vendor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rawText,vendorCode:val('vendorCode'),selectedCategory:val('category'),mode:val('mode')})});const data=await res.json();if(!res.ok)throw new Error(data.error||'解析失敗');parsedCategory=data.category||'clothing';set('productName',cleanText(data.productName,'space'));set('colors',cleanText(data.colors||'單一色','space'));set('specs',cleanText(data.specs||'F','space'));set('sizeText',cleanText(data.sizeText));set('capacity',cleanText(data.capacity||data.specs||'','space'));if(parsedCategory==='skincare')set('skincareCost',data.cost||'');else set('clothingCost',data.cost||'');set('labelPurpose',cleanText(data.labelPurpose,'space'));set('labelExpiry',cleanText(data.labelExpiry||'詳見產品外盒','space'));set('labelCompany',cleanText(data.labelCompany||'布布韓國工作室','space'));set('labelContact',cleanText(data.labelContact||'@bubukorea','space'));set('labelOrigin',cleanText(data.labelOrigin||'韓國','space'));set('labelUsage',cleanText(data.labelUsage));currentCopy=cleanText(data.copy);set('manualRetail','');set('manualVip','');set('manualVvip','');set('priceNote','');updateAll();const p0=calcPrices();set('manualRetail',p0.retail);set('manualVip',p0.vip);set('manualVvip',p0.vvip);updateAll();if(get('autoAdd').checked){const key=val('vendorCode')+'|'+val('productName')+'|'+getCost();if(key!==lastAutoAddedKey){await addTask(true);lastAutoAddedKey=key}}}catch(e){currentCopy='解析失敗：'+e.message+'\n請確認 Vercel 的 OPENAI_API_KEY 已設定。';updateAll()}finally{btn.disabled=false;btn.textContent='✨ AI 自動整理商品'}}
async function loadTasks(){try{const {data,error}=await supabaseClient.from('tasks').select('*').order('created_at',{ascending:false});if(error)throw error;tasks=(data||[]).map(r=>({id:r.id,...JSON.parse(r.content)}));renderTasks();cloud('☁️ 雲端已同步',true)}catch(e){cloud('雲端讀取失敗：'+e.message,false)}}
async function addTask(silent=false){const p=calcPrices(),vendor=val('vendorCode'),name=val('productName');if(!name){if(!silent)alert('沒有商品名稱');return}const title=vendor&&!name.startsWith(vendor+'｜')?vendor+'｜'+name:name;if(tasks.some(t=>t.title===title&&String(t.cost)===String(p.cost)&&!t.done)){const found=tasks.find(t=>t.title===title&&String(t.cost)===String(p.cost)&&!t.done);currentEditingId=found?found.id:null;if(!silent)alert('工作台已有這件商品，已切到自動更新模式');return}const item={done:false,selected:true,title,category:p.cat,retail:p.retail,vip:p.vip,vvip:p.vvip,wholesale:p.vvip,cost:p.cost,landed:p.landed,priceNote:get('priceNote')?val('priceNote'):'',colors:val('colors'),specs:val('specs'),sizeText:val('sizeText'),capacity:val('capacity'),time:new Date().toLocaleString(),fullPost:get('fullPost').innerText,copy:currentCopy,label:get('labelPreview')?get('labelPreview').innerText:'',market:get('marketBox')?get('marketBox').innerText:''};const {data,error}=await supabaseClient.from('tasks').insert({content:JSON.stringify(item)}).select('*').single();if(error){alert('雲端新增失敗：'+error.message);return}currentEditingId=data.id;await loadTasks()}
async function toggleTask(i){const t=tasks[i],u={...t,done:!t.done};delete u.id;const {error}=await supabaseClient.from('tasks').update({content:JSON.stringify(u)}).eq('id',t.id);if(error){alert('更新失敗：'+error.message);return}await loadTasks()}
async function deleteTask(i){const {error}=await supabaseClient.from('tasks').delete().eq('id',tasks[i].id);if(error){alert('刪除失敗：'+error.message);return}await loadTasks()}
function renderTasks(){get('taskBody').innerHTML=tasks.map((t,i)=>`<tr><td class="checkCell"><input type="checkbox" ${t.selected!==false?'checked':''} onchange="setSelected(${i},this.checked)"></td><td><span class="pill ${t.done?'done':''}">${t.done?'✅ 已同步':'⏳ 未同步'}</span></td><td>${t.title}<br><span style="font-size:12px;color:#64748b">${t.time||''}${t.priceNote?'<br>備註：'+t.priceNote:''}</span></td><td>${t.retail||''}</td><td><b>${t.vip||''}</b></td><td><b>${t.vvip||t.wholesale||''}</b></td><td>${t.cost}</td><td style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn small gray" onclick="copyTaskPost(${i})">📋 文案</button> <button class="btn small gray" onclick="copyTaskLabel(${i})">🏷️ 標籤</button> <button class="btn small" onclick="editTask(${i})">✏️ 編輯</button> <button class="btn small" onclick="toggleTask(${i})">✔ 已同步</button> <button class="btn small red" onclick="deleteTask(${i})">刪除</button></td></tr>`).join('')}

function copyTaskPost(i){const t=tasks[i];const text=t.fullPost||t.copy||t.title||'';navigator.clipboard.writeText(text).then(()=>alert('已複製文案'))}
function copyTaskLabel(i){const t=tasks[i];const text=t.label||'';if(!text){alert('這筆目前沒有中文標籤');return}navigator.clipboard.writeText(text).then(()=>alert('已複製中文標籤'))}

function editTask(i){const t=tasks[i];currentEditingId=t.id;set('productName',(t.title||'').replace(/^.*?｜/,''));parsedCategory=t.category||detectCategory();if(t.category)get('category').value=t.category;if(detectCategory()==='skincare')set('skincareCost',t.cost||'');else set('clothingCost',t.cost||'');set('manualRetail',t.retail||'');set('manualVip',t.vip||'');set('manualVvip',t.vvip||t.wholesale||'');set('priceNote',t.priceNote||'');set('colors',t.colors||'');set('specs',t.specs||'F');set('sizeText',t.sizeText||'');set('capacity',t.capacity||'');if(get('marketBox'))get('marketBox').innerText=t.market||'尚未查詢市場價格。';currentCopy=t.copy||'';updateAll();window.scrollTo({top:0,behavior:'smooth'});cloud('✏️ 已進入編輯模式，價格修改會自動同步',true)}

function scheduleAutoSync(){clearTimeout(autoSaveTimer);autoSaveTimer=setTimeout(autoSyncCurrentTask,700)}

async function autoSyncCurrentTask(){if(!currentEditingId)return;const p=calcPrices(),vendor=val('vendorCode'),name=val('productName');if(!name)return;const old=tasks.find(t=>t.id===currentEditingId)||{};const title=vendor&&name&&!name.startsWith(vendor+'｜')?vendor+'｜'+name:name;const updated={...old,done:old.done||false,selected:old.selected!==false,title,category:p.cat,retail:p.retail,vip:p.vip,vvip:p.vvip,wholesale:p.vvip,cost:p.cost,landed:p.landed,priceNote:get('priceNote')?val('priceNote'):'',colors:val('colors'),specs:val('specs'),sizeText:val('sizeText'),capacity:val('capacity'),time:old.time||new Date().toLocaleString(),updatedAt:new Date().toLocaleString(),fullPost:get('fullPost').innerText,copy:currentCopy,label:get('labelPreview')?get('labelPreview').innerText:'',market:get('marketBox')?get('marketBox').innerText:''};delete updated.id;const {error}=await supabaseClient.from('tasks').update({content:JSON.stringify(updated)}).eq('id',currentEditingId);if(error){cloud('自動同步失敗：'+error.message,false);return}cloud('⚡ 已自動同步工作台',true);await loadTasks()}


function setSelected(i,checked){const t=tasks[i];if(!t)return;t.selected=checked;const u={...t};delete u.id;supabaseClient.from('tasks').update({content:JSON.stringify(u)}).eq('id',t.id).then(()=>loadTasks())}
function toggleAllSelected(checked){Promise.all(tasks.map(t=>{const u={...t,selected:checked};const id=u.id;delete u.id;return supabaseClient.from('tasks').update({content:JSON.stringify(u)}).eq('id',id)})).then(()=>loadTasks())}

function productCodeFromTitle(title){const m=String(title||'').match(/(?:^|｜|\s)([#A-Z]*\d{3,}[A-Z0-9-]*)/i);return m?m[1]:''}
function todayEndDate(){const d=new Date();d.setDate(d.getDate()+30);return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`}

function exportAiplusExcel(){
 if(typeof XLSX==='undefined'){alert('Excel模組未載入，請重新整理');return}
 const rows=[];
 rows.push(['版本號：',20260504]);
 rows.push(['愛＋１匯入說明']);
 rows.push(['. 標題標記 : 【 ＊ : 必填 】,【 # : 如符合條件則必填 】,【 無標記：可選填 】']);
 rows.push(['. 欄位底色 : 【 灰色 : 商品資訊 】,【 黃色 : 款式資訊 】,【 紫色: 價格資訊 】']);
 rows.push(['. 註 : 同商品不同款式, 則僅第一筆需填入商品資訊, 且僅有第一筆資料會匯入']);
 rows.push(['＊','＊','＊',null,null,null,null,null,'＊',null,null,null,null,null,'#']);
 const headers=['開團類型','商品名稱','結團日期','內文','主圖片連結','主款式','副款式1','副款式2','售價','成本','供應商','商品編號','款式編號','款式圖片','庫存 ( 現貨必填 )','倉位','其他圖片連結1','其他圖片連結2','其他圖片連結3','其他圖片連結4','其他圖片連結5','影片連結','特價','VIP','VVIP','SVIP','SVVIP','條碼','折扣種類','折扣件數\n(件)','折扣價格\n(元)','折扣比例\n(％)','備註'];
 rows.push(headers);
 const selected=tasks.filter(t=>t.selected!==false);
 if(!selected.length){alert('請先勾選要匯出的商品');return}
 selected.forEach(t=>{
   const category=t.category||'clothing';
   const mainStyle=category==='clothing'?(t.colors||'單一色'):(t.capacity||t.specs||'單一規格');
   const sub1=category==='clothing'?(t.specs||'F'):'';
   const sub2=category==='clothing'?(t.sizeText||''):'';
   rows.push([
     '現貨',
     t.title||'',
     todayEndDate(),
     t.fullPost||t.copy||'',
     '',
     mainStyle,
     sub1,
     sub2,
     Number(t.retail||0),
     Number(t.cost||0),
     '',
     productCodeFromTitle(t.title),
     '',
     '',
     999,
     '',
     '','','','','','',
     '',
     Number(t.vip||0),
     Number(t.vvip||t.wholesale||0),
     '',
     '',
     '',
     '',
     '',
     '',
     '',
     t.priceNote||''
   ]);
 });
 const ws=XLSX.utils.aoa_to_sheet(rows);
 ws['!cols']=headers.map((h,i)=>({wch:i===3?50:i===1?28:i>=22&&i<=26?10:14}));
 const wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,'開團資訊');
 XLSX.writeFile(wb,`愛加一匯入_${new Date().toISOString().slice(0,10)}.xlsx`);
}

async function checkMarketPrice(){
 const name=val('productName');
 if(!name){alert('請先產生商品名稱');return}
 const p=calcPrices();
 get('marketBox').innerText='AI正在偵測外部售價...';
 try{
   const res=await fetch('/api/market-price',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({productName:name,category:detectCategory(),retail:p.retail,vip:p.vip,vvip:p.vvip,cost:p.cost})});
   const data=await res.json();
   if(!res.ok)throw new Error(data.error||'查詢失敗');
   const text=data.summary||'目前沒有取得市場價。';
   get('marketBox').innerText=text;
   set('priceNote',text.slice(0,180));
   updateAll();
 }catch(e){
   get('marketBox').innerText='外部售價偵測失敗：'+e.message+'\\n提醒：若未設定 SERPAPI_API_KEY，系統不會假裝有查到外部價格。';
 }
}
