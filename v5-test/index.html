<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Bubu AI V6.5.2.5 規格修正版</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 16px;
    line-height: 1.5;
  }
  h1 { font-size: 22px; margin: 0 0 4px; }
  h2 { font-size: 18px; margin: 0 0 12px; color: #93c5fd; }
  .topbar {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding: 14px 16px;
    background: #1e293b;
    border-radius: 12px;
  }
  .topbar p { margin: 4px 0 0; font-size: 13px; color: #94a3b8; }
  .cloud {
    background: #0e7490;
    color: #fff;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 13px;
    white-space: nowrap;
  }
  .cloud.bad { background: #b91c1c; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 16px;
  }
  .card {
    background: #1e293b;
    border-radius: 12px;
    padding: 16px;
    border: 1px solid #334155;
  }
  label {
    display: block;
    font-size: 13px;
    color: #cbd5e1;
    margin: 10px 0 4px;
  }
  input, select, textarea {
    width: 100%;
    padding: 8px 10px;
    background: #0f172a;
    color: #e2e8f0;
    border: 1px solid #334155;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }
  textarea { min-height: 80px; resize: vertical; }
  textarea.raw { min-height: 180px; }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #3b82f6;
  }
  .btn {
    display: inline-block;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.ai { background: linear-gradient(135deg, #8b5cf6, #ec4899); width: 100%; }
  .btn.gray { background: #475569; }
  .btn.red { background: #dc2626; }
  .btn.teal { background: #0d9488; }
  .btn.purple { background: #7c3aed; }
  .btn.small { padding: 6px 10px; font-size: 12px; margin-top: 0; }
  .priceGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .mini {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 8px;
    text-align: center;
  }
  .mini .k { font-size: 11px; color: #94a3b8; }
  .mini .v { font-size: 16px; font-weight: 700; color: #fbbf24; }
  .priceBox {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 8px;
  }
  .priceBox.market { display: flex; align-items: flex-end; }
  .grid2 {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 8px;
    margin-top: 8px;
  }
  .preview {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 12px;
    white-space: pre-wrap;
    font-size: 14px;
    margin-top: 8px;
    min-height: 80px;
    color: #cbd5e1;
  }
  .preview.market { background: #1e3a5f; }
  .hidden { display: none !important; }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    padding: 8px 6px;
    text-align: left;
    border-bottom: 1px solid #334155;
    vertical-align: top;
  }
  th { background: #0f172a; color: #94a3b8; font-weight: 600; }
  .pill {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 999px;
    background: #f59e0b;
    color: #1e293b;
    font-size: 11px;
    font-weight: 700;
  }
  .pill.done { background: #10b981; color: #fff; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>Bubu AI V6.5.2.5 規格修正版</h1>
    <p>規格欄不再被誤填特色關鍵字、尺寸文字保留換行、AI 整理完成後自動偵測市場價格。</p>
  </div>
  <span id="cloudStatus" class="cloud">雲端連線中...</span>
</div>

<div class="grid">

  <div class="card">
    <h2>① 廠商原文</h2>
    <label>廠商代碼</label>
    <input id="vendorCode" value="BY"/>
    <label>成本模式</label>
    <select id="mode" onchange="updateAll()">
      <option value="taiwan">台灣 / 五分埔 NT成本</option>
      <option value="korea">韓國 / S成本</option>
    </select>
    <label>商品分類</label>
    <select id="category" onchange="parsedCategory=this.value==='auto'?parsedCategory:this.value;updateAll()">
      <option value="auto">AI自動判斷</option>
      <option value="clothing">服飾</option>
      <option value="skincare">保養品 / 彩妝</option>
      <option value="life">生活用品</option>
    </select>
    <label>貼上廠商原文</label>
    <textarea id="rawText" class="raw"></textarea>
    <label><input id="autoAdd" type="checkbox" checked style="width:auto"/> AI整理完成後，自動加入雲端同步工作台</label>
    <button id="parseBtn" class="btn ai" onclick="parseVendor()">✨ AI 自動整理商品</button>
  </div>

  <div class="card">
    <h2>② AI解析結果 / 可微調</h2>
    <label>商品名稱</label>
    <input id="productName" oninput="updateAll()"/>

    <div id="clothingCostBox">
      <label>服飾成本 / 拿貨價</label>
      <input id="clothingCost" type="number" oninput="updateAll()"/>
    </div>
    <div id="skincareCostBox" class="hidden">
      <label>保養品拿貨價</label>
      <input id="skincareCost" type="number" oninput="updateAll()"/>
    </div>

    <div id="clothingFields">
      <label>顏色</label>
      <input id="colors" oninput="updateAll()"/>
      <label>規格</label>
      <input id="specs" value="F" oninput="updateAll()"/>
      <label>尺寸 / 規格補充</label>
      <textarea id="sizeText" oninput="updateAll()"></textarea>
    </div>

    <div id="skincareFields" class="hidden">
      <label>容量 / 規格</label>
      <input id="capacity" oninput="updateAll()"/>
      <label>中文標籤｜用途</label>
      <input id="labelPurpose" oninput="updateAll()"/>
      <label>中文標籤｜保存期限</label>
      <input id="labelExpiry" value="詳見產品外盒" oninput="updateAll()"/>
      <label>中文標籤｜責任業者</label>
      <input id="labelCompany" value="布布韓國工作室" oninput="updateAll()"/>
      <label>中文標籤｜聯絡方式</label>
      <input id="labelContact" value="@bubukorea" oninput="updateAll()"/>
      <label>中文標籤｜產地</label>
      <input id="labelOrigin" value="韓國" oninput="updateAll()"/>
      <label>中文標籤｜使用方式 / 注意事項補充</label>
      <textarea id="labelUsage" oninput="updateAll()"></textarea>
    </div>

    <div class="priceGrid">
      <div class="mini"><div class="k">落地成本</div><div id="landed" class="v">0</div></div>
      <div class="mini"><div class="k">原價</div><div id="retail" class="v">0</div></div>
      <div class="mini"><div class="k">VIP</div><div id="vip" class="v">0</div></div>
    </div>
    <div class="priceGrid">
      <div class="mini"><div class="k">VVIP</div><div id="vvip" class="v">0</div></div>
      <div class="priceBox"><label>手動原價</label><input id="manualRetail" type="number" placeholder="可自行調整" oninput="updateAll()"/></div>
      <div class="priceBox"><label>手動VIP</label><input id="manualVip" type="number" placeholder="可自行調整" oninput="updateAll()"/></div>
    </div>
    <div class="grid2">
      <div class="priceBox"><label>手動VVIP</label><input id="manualVvip" type="number" placeholder="可自行調整" oninput="updateAll()"/></div>
      <div class="priceBox"><label>市場價 / 價格備註</label><input id="priceNote" placeholder="AI偵測後自動填入，可手動調整" oninput="updateAll()"/></div>
    </div>
    <div id="marketAdvice" class="preview market" style="min-height:80px;margin-top:14px">尚未偵測。AI 整理商品後會自動偵測市場價格。</div>
  </div>

</div>

<div class="card" style="margin-top:16px">
  <h2>③ 完整貼文預覽</h2>
  <div id="fullPost" class="preview">請先貼廠商原文，按「AI 自動整理商品」。</div>
  <button class="btn gray" onclick="copyPost()">📋 一鍵複製完整貼文</button>
</div>

<div id="labelCard" class="card hidden" style="margin-top:16px">
  <h2>④ 保養品中文標籤</h2>
  <div id="labelPreview" class="preview"></div>
  <button class="btn gray" onclick="copyLabel()">🏷️ 複製中文標籤</button>
</div>

<div class="card" style="margin-top:16px">
  <h2>⑤ 雲端同步工作台</h2>
  <div class="toolbar">
    <button class="btn small purple" onclick="exportAiPlusExcel()">📤 匯出愛+1 Excel</button>
  </div>
  <div style="overflow-x:auto">
    <table>
      <thead>
        <tr><th>狀態</th><th>商品</th><th>原價</th><th>VIP</th><th>VVIP</th><th>成本</th><th>動作</th></tr>
      </thead>
      <tbody id="taskBody"></tbody>
    </table>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xkjayekdbezakvnyjvwu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6arvG__i8D6QAuP3MgV_7A_cmjmxzg_';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentCopy = '', parsedCategory = 'clothing', lastAutoAddedKey = '';
let tasks = [], currentEditingId = null, autoSaveTimer = null;

const get = id => document.getElementById(id);
const val = id => get(id).value.trim();
const set = (id, v) => { get(id).value = v || ''; };
const ceil10 = n => Math.ceil((Number(n) || 0) / 10) * 10;
const money = n => 'NT$' + Math.round(Number(n) || 0).toLocaleString();

function cloud(text, ok = true) {
  get('cloudStatus').textContent = text;
  get('cloudStatus').classList.toggle('bad', !ok);
}

function cleanText(v, mode = 'line') {
  let t = String(v || '').replace(/\\n/g, '\n').replace(/\r\n/g, '\n');
  return mode === 'space' ? t.replace(/\s+/g, ' ').trim() : t.replace(/\n{3,}/g, '\n\n').trim();
}

function detectCategory() {
  const s = val('category');
  return s !== 'auto' ? s : (parsedCategory || 'clothing');
}

function getCost() {
  return Number(detectCategory() === 'skincare' ? val('skincareCost') : val('clothingCost')) || 0;
}

// V6.5.2.2.2 修正：VVIP 公式對齊 README → /0.84（原本 index.html 寫成 0.844 是 bug）
function calcPrices() {
  const mode = val('mode'), cat = detectCategory(), cost = getCost();
  let landed = 0;
  if (mode === 'taiwan') landed = cost;
  else landed = Math.ceil(cost * 1.27);
  const base = landed;
  let retail = ceil10((base + 54) / 0.78);
  let vip    = ceil10((base + 47) / 0.82);
  let vvip   = ceil10((base + 40) / 0.84);
  const mr = Number(val('manualRetail')) || 0;
  const mv = Number(val('manualVip')) || 0;
  const mw = Number(val('manualVvip')) || 0;
  if (mr > 0) retail = mr;
  if (mv > 0) vip = mv;
  if (mw > 0) vvip = mw;
  return { landed, retail, vip, vvip, wholesale: vvip, cost, cat, priceBase: base };
}

function switchMode() {
  const skin = detectCategory() === 'skincare';
  get('clothingFields').classList.toggle('hidden', skin);
  get('clothingCostBox').classList.toggle('hidden', skin);
  get('skincareFields').classList.toggle('hidden', !skin);
  get('skincareCostBox').classList.toggle('hidden', !skin);
  get('labelCard').classList.toggle('hidden', !skin);
}

function updateAll() {
  const p = calcPrices();
  get('landed').textContent = money(p.landed);
  get('retail').textContent = money(p.retail);
  get('vip').textContent = money(p.vip);
  get('vvip').textContent = money(p.vvip);
  switchMode();
  const vendor = val('vendorCode'), name = val('productName');
  const title = vendor && name && !name.startsWith(vendor + '｜') ? vendor + '｜' + name : (name || '');
  const copy = cleanText(currentCopy) || '文案生成中或尚未生成。';
  let full = '';
  if (p.cat === 'skincare') {
    const cap = val('capacity') || '依實際包裝標示';
    full = `${title}\n\n價格：${p.retail}\n規格：${cap}\n\n——————————\n\n${copy}`;
    updateLabelPreview(title);
  } else {
    const colors = val('colors') || '單一色';
    const specs = val('specs') || 'F';
    const size = cleanText(val('sizeText'));
    full = `${title}\n\n顏色：${colors}\n規格：${specs}\n價格：${p.retail}\n\n${size ? '📏 尺寸（平量cm）\n' + size + '\n' : ''}——————————\n\n${copy}`;
  }
  get('fullPost').textContent = cleanText(full);
  if (currentEditingId) scheduleAutoSync();
}

function updateLabelPreview(title) {
  get('labelPreview').textContent = cleanText(
    `${title || val('productName')}\n${val('capacity') || '依實際包裝標示'}｜${val('labelOrigin') || '韓國'}\n用途：${val('labelPurpose') || '日常保養／清潔使用'}\n保存期限：${val('labelExpiry') || '詳見產品外盒'}\n責任業者：${val('labelCompany') || '布布韓國工作室'}\n聯絡方式：${val('labelContact') || '@bubukorea'}${val('labelUsage') ? '\n\n' + cleanText(val('labelUsage')) : ''}`
  );
}

async function parseVendor() {
  const rawText = val('rawText');
  if (!rawText) { alert('請先貼上廠商原文'); return; }
  const btn = get('parseBtn');
  btn.disabled = true;
  btn.textContent = 'AI整理中...';
  try {
    const res = await fetch('/api/parse-vendor', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rawText, vendorCode: val('vendorCode'), selectedCategory: val('category'), mode: val('mode') })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '解析失敗');
    parsedCategory = data.category || 'clothing';
    set('productName', cleanText(data.productName, 'space'));
    set('colors', cleanText(data.colors || '單一色', 'space'));

    // V6.5.2.5 防護：清理 specs，如果 AI 又亂填特色關鍵字就改成 F
    let cleanSpecs = cleanText(data.specs || 'F', 'space');
    const badWords = /(設計|版型|面料|風格|款式|剪裁|材質|布料|工藝|腰帶|裙襬)/;
    if (badWords.test(cleanSpecs)) {
      console.warn('AI 又把特色關鍵字填進 specs，已自動改為 F：', cleanSpecs);
      cleanSpecs = 'F';
    }
    set('specs', cleanSpecs);

    // V6.5.2.5 防護：sizeText 如果被 AI 用分號擠成一行，改回換行
    let cleanSize = cleanText(data.sizeText);
    if (cleanSize && !cleanSize.includes('\n') && /[;；]/.test(cleanSize)) {
      cleanSize = cleanSize.split(/\s*[;；]\s*/).filter(Boolean).join('\n');
    }
    set('sizeText', cleanSize);
    set('capacity', cleanText(data.capacity || data.specs || '', 'space'));
    if (parsedCategory === 'skincare') set('skincareCost', data.cost || '');
    else set('clothingCost', data.cost || '');
    set('labelPurpose', cleanText(data.labelPurpose, 'space'));
    set('labelExpiry', cleanText(data.labelExpiry || '詳見產品外盒', 'space'));
    set('labelCompany', cleanText(data.labelCompany || '布布韓國工作室', 'space'));
    set('labelContact', cleanText(data.labelContact || '@bubukorea', 'space'));
    set('labelOrigin', cleanText(data.labelOrigin || '韓國', 'space'));
    set('labelUsage', cleanText(data.labelUsage));
    currentCopy = cleanText(data.copy);
    set('manualRetail', ''); set('manualVip', ''); set('manualVvip', '');
    set('priceNote', '');
    get('marketAdvice').textContent = '尚未偵測。';
    updateAll();
    if (get('autoAdd').checked) {
      const key = val('vendorCode') + '|' + val('productName') + '|' + getCost();
      if (key !== lastAutoAddedKey) { await addTask(true); lastAutoAddedKey = key; }
    }
    // V6.5.2.4：AI 整理完成後自動偵測市場價格（不阻塞主流程，失敗也沒關係）
    checkMarketPrice(true).then(() => {
      // 偵測完成後再同步一次工作台，把 marketAdvice / priceNote 寫進去
      if (currentEditingId) scheduleAutoSync();
    });
  } catch (e) {
    currentCopy = '解析失敗：' + e.message + '\n請確認 Vercel 的 OPENAI_API_KEY 已設定。';
    updateAll();
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ AI 自動整理商品';
  }
}

async function loadTasks() {
  try {
    const { data, error } = await supabaseClient.from('tasks').select('*').order('created_at', { ascending: false });
    if (error) throw error;
    tasks = (data || []).map(r => ({ id: r.id, ...JSON.parse(r.content) }));
    renderTasks();
    cloud('☁️ 雲端已同步', true);
  } catch (e) {
    cloud('雲端讀取失敗：' + e.message, false);
  }
}

async function addTask(silent = false) {
  const p = calcPrices(), vendor = val('vendorCode'), name = val('productName');
  if (!name) { if (!silent) alert('沒有商品名稱'); return; }
  const title = vendor && !name.startsWith(vendor + '｜') ? vendor + '｜' + name : name;
  if (tasks.some(t => t.title === title && String(t.cost) === String(p.cost) && !t.done)) {
    const found = tasks.find(t => t.title === title && String(t.cost) === String(p.cost) && !t.done);
    currentEditingId = found ? found.id : null;
    if (!silent) alert('工作台已有這件商品，已切到自動更新模式');
    return;
  }
  const item = {
    done: false, title,
    retail: p.retail, vip: p.vip, vvip: p.vvip, wholesale: p.vvip,
    cost: p.cost, category: p.cat,
    colors: val('colors'), specs: val('specs'), sizeText: val('sizeText'),
    capacity: val('capacity'),
    priceNote: val('priceNote'),
    marketAdvice: get('marketAdvice').innerText,
    time: new Date().toLocaleString(),
    fullPost: get('fullPost').innerText,
    copy: currentCopy,
    label: get('labelPreview') ? get('labelPreview').innerText : ''
  };
  const { data, error } = await supabaseClient.from('tasks').insert({ content: JSON.stringify(item) }).select('*').single();
  if (error) { alert('雲端新增失敗：' + error.message); return; }
  currentEditingId = data.id;
  await loadTasks();
}

async function toggleTask(i) {
  const t = tasks[i], u = { ...t, done: !t.done };
  delete u.id;
  const { error } = await supabaseClient.from('tasks').update({ content: JSON.stringify(u) }).eq('id', t.id);
  if (error) { alert('更新失敗：' + error.message); return; }
  await loadTasks();
}

async function deleteTask(i) {
  if (!confirm('確定刪除這筆？')) return;
  const { error } = await supabaseClient.from('tasks').delete().eq('id', tasks[i].id);
  if (error) { alert('刪除失敗：' + error.message); return; }
  await loadTasks();
}

function renderTasks() {
  get('taskBody').innerHTML = tasks.map((t, i) => `
    <tr>
      <td><span class="pill ${t.done ? 'done' : ''}">${t.done ? '✅ 已同步' : '⏳ 未同步'}</span></td>
      <td>${t.title}<br><span style="font-size:12px;color:#64748b">${t.time || ''}${t.priceNote ? '<br>備註：' + t.priceNote : ''}</span></td>
      <td>${t.retail || ''}</td>
      <td><b>${t.vip || ''}</b></td>
      <td><b>${t.vvip || t.wholesale || ''}</b></td>
      <td>${t.cost}</td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn small gray" onclick="copyTaskPost(${i})">📋 文案</button>
        <button class="btn small gray" onclick="copyTaskLabel(${i})">🏷️ 標籤</button>
        <button class="btn small" onclick="editTask(${i})">✏️ 編輯</button>
        <button class="btn small" onclick="toggleTask(${i})">✔ 已同步</button>
        <button class="btn small red" onclick="deleteTask(${i})">刪除</button>
      </td>
    </tr>`).join('');
}

function copyTaskPost(i) {
  const t = tasks[i];
  const text = t.fullPost || t.copy || t.title || '';
  navigator.clipboard.writeText(text).then(() => alert('已複製文案'));
}

function copyTaskLabel(i) {
  const t = tasks[i];
  const text = t.label || '';
  if (!text) { alert('這筆目前沒有中文標籤'); return; }
  navigator.clipboard.writeText(text).then(() => alert('已複製中文標籤'));
}

function editTask(i) {
  const t = tasks[i];
  currentEditingId = t.id;
  set('productName', (t.title || '').replace(/^.*?｜/, ''));
  if ((t.category || detectCategory()) === 'skincare') set('skincareCost', t.cost || '');
  else set('clothingCost', t.cost || '');
  set('manualRetail', t.retail || '');
  set('manualVip', t.vip || '');
  set('manualVvip', t.vvip || t.wholesale || '');
  set('priceNote', t.priceNote || '');
  get('marketAdvice').textContent = t.marketAdvice || '尚未偵測。';
  currentCopy = t.copy || '';
  updateAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  cloud('✏️ 已進入編輯模式，價格修改會自動同步', true);
}

function scheduleAutoSync() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(autoSyncCurrentTask, 700);
}

async function autoSyncCurrentTask() {
  if (!currentEditingId) return;
  const p = calcPrices(), vendor = val('vendorCode'), name = val('productName');
  if (!name) return;
  const old = tasks.find(t => t.id === currentEditingId) || {};
  const title = vendor && name && !name.startsWith(vendor + '｜') ? vendor + '｜' + name : name;
  const updated = {
    ...old, done: old.done || false, title,
    retail: p.retail, vip: p.vip, vvip: p.vvip, wholesale: p.vvip,
    cost: p.cost, category: p.cat,
    colors: val('colors'), specs: val('specs'), sizeText: val('sizeText'),
    capacity: val('capacity'),
    priceNote: val('priceNote'),
    marketAdvice: get('marketAdvice').innerText,
    time: old.time || new Date().toLocaleString(),
    updatedAt: new Date().toLocaleString(),
    fullPost: get('fullPost').innerText,
    copy: currentCopy,
    label: get('labelPreview') ? get('labelPreview').innerText : ''
  };
  delete updated.id;
  const { error } = await supabaseClient.from('tasks').update({ content: JSON.stringify(updated) }).eq('id', currentEditingId);
  if (error) { cloud('自動同步失敗：' + error.message, false); return; }
  cloud('⚡ 已自動同步工作台', true);
  await loadTasks();
}

// V6.5.2.4 自動偵測市場價格
// silent=true 時不要 alert，靜默失敗（用於自動觸發）
async function checkMarketPrice(silent = false) {
  const name = val('productName');
  if (!name) {
    if (!silent) alert('請先產生商品名稱');
    return;
  }
  const p = calcPrices();
  const box = get('marketAdvice');
  box.textContent = '🔎 AI 正在偵測市場價格，請稍候...';
  try {
    const res = await fetch('/api/price-check', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        productName: name, category: detectCategory(),
        retail: p.retail, vip: p.vip, vvip: p.vvip,
        cost: p.cost, copy: currentCopy
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '市場價格偵測失敗');

    const advice = cleanText(data.advice || '');
    const shortNote = cleanText(data.shortNote || '', 'space');

    if (!advice && !shortNote) {
      // AI 完全沒給結果
      box.textContent = '❌ AI 偵測不到此商品的市場價格。\n建議手動查蝦皮 / Google / 同行價格後寫進「市場價 / 價格備註」。';
      return;
    }
    box.textContent = '✅ ' + (advice || shortNote);
    if (shortNote) set('priceNote', shortNote);
    updateAll();
  } catch (e) {
    box.textContent = '❌ AI 偵測不到此商品的市場價格。\n原因：' + e.message + '\n可手動查蝦皮 / Google / 同行價格後寫進「市場價 / 價格備註」。';
  }
}

// V6.5.2.3 愛+1完整相容
// 1. 表頭格式對齊範本（前 6 列說明 + 第 7 列才是欄位名）
// 2. 顏色×尺寸拆成多列；第一列填商品資訊，後面只填款式 + 價格
// 3. 備註欄（第33欄）放完整 AI 市場價格偵測結果
// 4. 匯出前 prompt 輸入結團日期

// 解析顏色字串 → 陣列；常見分隔符號：/ , 、 ， | 全形/半形 都吃
function parseColors(str) {
  if (!str) return ['單一色'];
  const arr = String(str).split(/[\/,、，|｜\s]+/).map(s => s.trim()).filter(Boolean);
  return arr.length ? arr : ['單一色'];
}

// 解析尺寸字串 → 陣列；同上
function parseSpecs(str) {
  if (!str) return ['F'];
  const arr = String(str).split(/[\/,、，|｜\s]+/).map(s => s.trim()).filter(Boolean);
  return arr.length ? arr : ['F'];
}

function buildAiPlusRows(deadline) {
  // 對齊範本：前 6 列說明 + 第 7 列才是真正表頭
  const rows = [
    ['版本號：', 20260504],
    ['愛＋１匯入說明'],
    ['. 標題標記 : 【 ＊ : 必填 】,【 # : 如符合條件則必填 】,【 無標記：可選填 】'],
    ['. 欄位底色 : 【 灰色 : 商品資訊 】,【 黃色 : 款式資訊 】,【 紫色: 價格資訊 】'],
    ['. 註 : 同商品不同款式, 則僅第一筆需填入商品資訊, 且僅有第一筆資料會匯入'],
    ['＊', '＊', '＊', '', '', '', '', '', '＊', '', '', '', '', '', '#'],
    ['開團類型', '商品名稱', '結團日期', '內文', '主圖片連結', '主款式', '副款式1', '副款式2', '售價', '成本', '供應商', '商品編號', '款式編號', '款式圖片', '庫存 ( 現貨必填 )', '倉位', '其他圖片連結1', '其他圖片連結2', '其他圖片連結3', '其他圖片連結4', '其他圖片連結5', '影片連結', '特價', 'VIP', 'VVIP', 'SVIP', 'SVVIP', '條碼', '折扣種類', '折扣件數\n(件)', '折扣價格\n(元)', '折扣比例\n(％)', '備註']
  ];

  const pending = tasks.filter(t => !t.done);

  pending.forEach(t => {
    const isSkincare = t.category === 'skincare';
    const colorList = isSkincare ? [t.capacity || '單一規格'] : parseColors(t.colors);
    const specList = isSkincare ? [''] : parseSpecs(t.specs);

    // 完整文案（內文欄）
    const content = t.fullPost || t.copy || '';
    // 備註欄：放 AI 市場價格偵測完整結果 + 短備註（如果有）
    const noteParts = [];
    if (t.marketAdvice && t.marketAdvice.trim() && t.marketAdvice.indexOf('尚未偵測') === -1) {
      noteParts.push(t.marketAdvice.trim());
    }
    if (t.priceNote && t.priceNote.trim()) {
      noteParts.push('短備註：' + t.priceNote.trim());
    }
    const remark = noteParts.join('\n\n');

    let firstRow = true;
    colorList.forEach(color => {
      specList.forEach(spec => {
        const row = new Array(33).fill('');
        if (firstRow) {
          row[0] = '預購';              // 開團類型
          row[1] = t.title || '';        // 商品名稱
          row[2] = deadline;             // 結團日期
          row[3] = content;              // 內文
          // row[4] 主圖片連結 留空
        }
        row[5] = color;                  // 主款式
        row[6] = spec;                   // 副款式1
        // row[7] 副款式2 留空
        row[8] = t.retail || '';         // 售價
        if (firstRow) {
          row[9] = t.cost || '';         // 成本（只放第一列即可）
        }
        // row[14] 庫存：預購不必填，留空
        row[23] = t.vip || '';           // VIP
        row[24] = t.vvip || t.wholesale || ''; // VVIP
        if (firstRow) {
          row[32] = remark;              // 備註（含 AI 市場價格偵測）
        }
        rows.push(row);
        firstRow = false;
      });
    });
  });

  return rows;
}

// 把今天 +N 天格式化成 yyyy/MM/dd
function defaultDeadline(daysAhead = 30) {
  const d = new Date();
  d.setDate(d.getDate() + daysAhead);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${yyyy}/${mm}/${dd}`;
}

function exportAiPlusExcel() {
  if (typeof XLSX === 'undefined') {
    alert('Excel匯出模組尚未載入，請重新整理後再試');
    return;
  }
  const pending = tasks.filter(t => !t.done);
  if (pending.length === 0) {
    alert('目前沒有未完成商品可匯出');
    return;
  }

  // 跳出對話框讓用戶輸入結團日期
  const suggested = defaultDeadline(30);
  let deadline = prompt(`請輸入結團日期（格式 yyyy/MM/dd）\n\n建議：${suggested}\n（直接按 Enter 採用建議值）`, suggested);
  if (deadline === null) return; // 用戶按取消
  deadline = deadline.trim() || suggested;

  // 格式檢查
  if (!/^\d{4}\/\d{1,2}\/\d{1,2}$/.test(deadline)) {
    alert('結團日期格式錯誤，請用 yyyy/MM/dd 例如 2026/06/27');
    return;
  }

  const rows = buildAiPlusRows(deadline);
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '開團資訊');
  XLSX.writeFile(wb, 'Bubu愛加一匯入_' + new Date().toISOString().slice(0, 10) + '.xlsx');
}

function copyPost() {
  navigator.clipboard.writeText(get('fullPost').innerText).then(() => alert('已複製完整貼文'));
}

function copyLabel() {
  navigator.clipboard.writeText(get('labelPreview').innerText).then(() => alert('已複製中文標籤'));
}

supabaseClient
  .channel('tasks-changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => loadTasks())
  .subscribe();

loadTasks();
updateAll();
