<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bubu AI V5 Readable Fixed</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      background: #f3f4f6;
      color: #0f172a;
    }
    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 22px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 14px 35px rgba(15, 23, 42, .09);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      font-weight: 900;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 900;
    }
    p {
      margin: 0;
      color: #64748b;
      line-height: 1.7;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }
    label {
      display: block;
      margin: 14px 0 7px;
      font-weight: 900;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid #d8e0ed;
      border-radius: 15px;
      padding: 13px 14px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      background: white;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.6;
    }
    .raw { min-height: 260px; }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 18px;
      margin-top: 14px;
      background: #111827;
      color: white;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }
    .btn.ai {
      background: linear-gradient(135deg, #7c3aed, #ec4899);
    }
    .btn.gray { background: #475569; }
    .btn.small {
      width: auto;
      padding: 9px 12px;
      margin: 0;
      font-size: 14px;
      border-radius: 11px;
    }
    .btn.red { background: #991b1b; }
    .two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .priceGrid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin-top: 16px;
    }
    .mini {
      border-radius: 18px;
      padding: 18px;
      background: #f8fafc;
      text-align: center;
    }
    .mini .k {
      font-size: 13px;
      color: #64748b;
      font-weight: 900;
    }
    .mini .v {
      font-size: 28px;
      font-weight: 900;
      margin-top: 4px;
    }
    .preview {
      white-space: pre-wrap;
      background: #faf5ff;
      border: 1px solid #e9d5ff;
      border-radius: 18px;
      padding: 18px;
      line-height: 1.8;
      min-height: 250px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 16px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 12px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }
    th {
      background: #f8fafc;
      font-weight: 900;
    }
    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 6px 10px;
      background: #fef3c7;
      color: #92400e;
      font-size: 12px;
      font-weight: 900;
    }
    .done {
      background: #dcfce7;
      color: #166534;
    }
    .note {
      font-size: 13px;
      color: #64748b;
      margin-top: 8px;
    }
    .switch {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      font-weight: 900;
    }
    .switch input {
      width: auto;
    }
    @media (max-width: 900px) {
      .wrap { padding: 12px; }
      .grid, .two, .priceGrid { grid-template-columns: 1fr; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>🔥 Bubu AI V5｜AI上架工作台</h1>
      <p>修正版：保留款號/貨號、整理完成自動加入今日同步工作台、修正 \n 跑出來的問題。</p>
    </div>

    <div class="grid">
      <div class="card">
        <h2>① 廠商原文</h2>

        <label>廠商代碼</label>
        <input id="vendorCode" value="BY" placeholder="例如：BY、BC、MK" />

        <label>成本模式</label>
        <select id="mode" onchange="updateAll()">
          <option value="taiwan">台灣 / 五分埔 NT成本</option>
          <option value="korea">韓國 / S成本</option>
        </select>

        <label>商品分類</label>
        <select id="category" onchange="updateAll()">
          <option value="auto">AI自動判斷</option>
          <option value="clothing">服飾</option>
          <option value="skincare">保養品 / 彩妝</option>
          <option value="life">生活用品</option>
        </select>

        <label>貼上廠商原文</label>
        <textarea id="rawText" class="raw" placeholder="整篇廠商文直接貼這裡..."></textarea>

        <div class="switch">
          <input id="autoAdd" type="checkbox" checked />
          <span>AI整理完成後，自動加入今日同步工作台</span>
        </div>

        <button id="parseBtn" class="btn ai" onclick="parseVendor()">✨ AI 自動整理商品</button>
        <p class="note">款號例如 0234、G060234、K15-0903 會保留在商品名稱前面。</p>
      </div>

      <div class="card">
        <h2>② AI解析結果 / 可微調</h2>

        <div class="two">
          <div>
            <label>商品名稱</label>
            <input id="productName" oninput="updateAll()" />
          </div>
          <div>
            <label>成本</label>
            <input id="cost" type="number" oninput="updateAll()" />
          </div>
        </div>

        <label>顏色</label>
        <input id="colors" oninput="updateAll()" />

        <label>規格</label>
        <input id="specs" value="F" oninput="updateAll()" />

        <label>尺寸 / 規格補充</label>
        <textarea id="sizeText" oninput="updateAll()"></textarea>

        <div class="priceGrid">
          <div class="mini">
            <div class="k">落地成本</div>
            <div id="landed" class="v">0</div>
          </div>
          <div class="mini">
            <div class="k">建議售價</div>
            <div id="retail" class="v">0</div>
          </div>
          <div class="mini">
            <div class="k">建議批價</div>
            <div id="wholesale" class="v">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>③ 完整貼文預覽（愛+1＋AI文案合併）</h2>
      <div id="fullPost" class="preview">請先貼廠商原文，按「AI 自動整理商品」。</div>
      <button class="btn gray" onclick="copyPost()">📋 一鍵複製完整貼文</button>
    </div>

    <div class="card">
      <h2>④ 今日同步工作台</h2>
      <p style="margin-bottom:14px">AI整理完成後會自動加入；去愛+1後台改批發價格，改完就按「已同步」。</p>
      <table>
        <thead>
          <tr>
            <th>狀態</th>
            <th>商品</th>
            <th>售價</th>
            <th>批價</th>
            <th>成本</th>
            <th>動作</th>
          </tr>
        </thead>
        <tbody id="taskBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    let currentCopy = "";
    let parsedCategory = "clothing";
    let lastAutoAddedKey = "";
    let tasks = JSON.parse(localStorage.getItem("bubu_v5_tasks") || "[]");

    function get(id) {
      return document.getElementById(id);
    }

    function val(id) {
      return get(id).value.trim();
    }

    function set(id, value) {
      get(id).value = value || "";
    }

    function cleanText(value, mode = "line") {
      const text = String(value || "");
      if (mode === "space") {
        return text
          .replace(/\\n/g, " ")
          .replace(/\n/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }
      return text
        .replace(/\\n/g, "\n")
        .replace(/\r\n/g, "\n")
        .trim();
    }

    function money(n) {
      return "NT$" + Math.round(Number(n) || 0).toLocaleString();
    }

    function ceil10(n) {
      return Math.ceil((Number(n) || 0) / 10) * 10;
    }

    function detectCategory() {
      const selected = val("category");
      if (selected !== "auto") return selected;
      return parsedCategory || "clothing";
    }

    function calcPrices() {
      const mode = val("mode");
      const cat = detectCategory();
      const cost = Number(val("cost")) || 0;

      let landed = 0;
      let retail = 0;
      let wholesale = 0;

      if (mode === "taiwan") {
        landed = cost + 10;

        if (cost <= 120) {
          retail = ceil10(cost + 80);
          wholesale = ceil10(cost + 50);
        } else if (cost <= 180) {
          retail = ceil10(cost + 100);
          wholesale = ceil10(cost + 70);
        } else if (cost <= 260) {
          retail = ceil10(cost + 130);
          wholesale = ceil10(cost + 90);
        } else {
          retail = ceil10(cost + 160);
          wholesale = ceil10(cost + 110);
        }
      } else {
        landed = Math.ceil(cost * 1.27);

        if (cat === "skincare" || cat === "life") {
          retail = ceil10(landed + 90);
          wholesale = ceil10(landed + 45);
        } else {
          retail = ceil10(landed + 160);
          wholesale = ceil10(landed + 90);
        }
      }

      return { landed, retail, wholesale, cost, cat };
    }

    function updateAll() {
      const p = calcPrices();

      get("landed").textContent = money(p.landed);
      get("retail").textContent = money(p.retail);
      get("wholesale").textContent = money(p.wholesale);

      const vendor = val("vendorCode");
      const name = val("productName");
      const title = vendor && name && !name.startsWith(vendor + "｜")
        ? vendor + "｜" + name
        : (name || "");

      const colors = val("colors") || "單一色";
      const specs = val("specs") || "F";
      const size = cleanText(val("sizeText"), "line");
      const copy = currentCopy || "文案生成中或尚未生成。";

      const fullPost =
`${title}

顏色：${colors}
規格：${specs}
價格：${p.retail}

${size ? "📏 尺寸（平量cm）\n" + size + "\n" : ""}——————————

${copy}`;

      get("fullPost").textContent = fullPost;
    }

    async function parseVendor() {
      const rawText = val("rawText");
      if (!rawText) {
        alert("請先貼上廠商原文");
        return;
      }

      const btn = get("parseBtn");
      btn.disabled = true;
      btn.textContent = "AI整理中...";

      try {
        const res = await fetch("/api/parse-vendor", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            rawText,
            vendorCode: val("vendorCode"),
            selectedCategory: val("category"),
            mode: val("mode")
          })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "解析失敗");
        }

        parsedCategory = data.category || "clothing";

        set("productName", cleanText(data.productName, "space"));
        set("colors", cleanText(data.colors || "單一色", "space"));
        set("specs", cleanText(data.specs || "F", "space"));
        set("sizeText", cleanText(data.sizeText, "line"));
        set("cost", data.cost || "");

        currentCopy = cleanText(data.copy, "line");

        updateAll();

        if (get("autoAdd").checked) {
          const key = val("vendorCode") + "|" + val("productName") + "|" + val("cost");

          if (key !== lastAutoAddedKey) {
            addTask(true);
            lastAutoAddedKey = key;
          }
        }
      } catch (err) {
        currentCopy = "解析失敗：" + err.message + "\n請確認 Vercel 的 OPENAI_API_KEY 已設定。";
        updateAll();
      } finally {
        btn.disabled = false;
        btn.textContent = "✨ AI 自動整理商品";
      }
    }

    function addTask(silent = false) {
      const p = calcPrices();
      const vendor = val("vendorCode");
      const name = val("productName");

      if (!name) {
        if (!silent) alert("沒有商品名稱");
        return;
      }

      const title = vendor && !name.startsWith(vendor + "｜")
        ? vendor + "｜" + name
        : name;

      const exists = tasks.some(t => t.title === title && String(t.cost) === String(p.cost));

      if (exists) {
        if (!silent) alert("工作台已有這件商品");
        return;
      }

      tasks.unshift({
        done: false,
        title,
        retail: p.retail,
        wholesale: p.wholesale,
        cost: p.cost,
        time: new Date().toLocaleString()
      });

      localStorage.setItem("bubu_v5_tasks", JSON.stringify(tasks));
      renderTasks();
    }

    function toggleTask(index) {
      tasks[index].done = !tasks[index].done;
      localStorage.setItem("bubu_v5_tasks", JSON.stringify(tasks));
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      localStorage.setItem("bubu_v5_tasks", JSON.stringify(tasks));
      renderTasks();
    }

    function renderTasks() {
      get("taskBody").innerHTML = tasks.map((t, index) => `
        <tr>
          <td>
            <span class="pill ${t.done ? "done" : ""}">
              ${t.done ? "✅ 已同步" : "⏳ 未同步"}
            </span>
          </td>
          <td>
            ${t.title}<br>
            <span style="font-size:12px;color:#64748b">${t.time || ""}</span>
          </td>
          <td>${t.retail}</td>
          <td><b>${t.wholesale}</b></td>
          <td>${t.cost}</td>
          <td>
            <button class="btn small" onclick="toggleTask(${index})">✔ 已同步</button>
            <button class="btn small red" onclick="deleteTask(${index})">刪除</button>
          </td>
        </tr>
      `).join("");
    }

    function copyPost() {
      navigator.clipboard.writeText(get("fullPost").innerText).then(() => {
        alert("已複製完整貼文");
      });
    }

    renderTasks();
    updateAll();
  </script>
</body>
</html>
