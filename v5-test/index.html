<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Bubu AI V6 Cloud</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',Arial,sans-serif;background:#f3f4f6;color:#0f172a}.wrap{max-width:1320px;margin:0 auto;padding:22px}.card{background:#fff;border-radius:24px;padding:24px;margin-bottom:20px;box-shadow:0 14px 35px rgba(15,23,42,.09)}h1{margin:0 0 8px;font-size:32px;font-weight:900}h2{margin:0 0 16px;font-size:24px;font-weight:900}p{margin:0;color:#64748b;line-height:1.7}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}label{display:block;margin:14px 0 7px;font-weight:900}input,select,textarea{width:100%;border:1px solid #d8e0ed;border-radius:15px;padding:13px 14px;font-size:16px;font-family:inherit;outline:none;background:#fff}textarea{min-height:110px;resize:vertical;line-height:1.6}.raw{min-height:260px}.btn{width:100%;border:0;border-radius:16px;padding:15px 18px;margin-top:14px;background:#111827;color:#fff;font-size:17px;font-weight:900;cursor:pointer}.btn.ai{background:linear-gradient(135deg,#7c3aed,#ec4899)}.btn.gray{background:#475569}.btn.small{width:auto;padding:9px 12px;margin:0;font-size:14px;border-radius:11px}.btn.red{background:#991b1b}.priceGrid,.grid2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:16px}.mini{border-radius:18px;padding:18px;background:#f8fafc;text-align:center}.mini .k{font-size:13px;color:#64748b;font-weight:900}.mini .v{font-size:28px;font-weight:900;margin-top:4px}.preview{white-space:pre-wrap;background:#faf5ff;border:1px solid #e9d5ff;border-radius:18px;padding:18px;line-height:1.8;min-height:250px}table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden}th,td{border-bottom:1px solid #e5e7eb;padding:12px;text-align:left;vertical-align:top;font-size:14px}th{background:#f8fafc;font-weight:900}.pill{display:inline-block;border-radius:999px;padding:6px 10px;background:#fef3c7;color:#92400e;font-size:12px;font-weight:900}.done{background:#dcfce7;color:#166534}.hidden{display:none}.cloud{display:inline-block;margin-top:10px;background:#dcfce7;color:#166534;padding:7px 12px;border-radius:999px;font-weight:900;font-size:13px}.cloud.bad{background:#fee2e2;color:#991b1b}@media(max-width:900px){.wrap{padding:12px}.grid,.grid2,.priceGrid{grid-template-columns:1fr}h1{font-size:26px}}</style></head><body><div class="wrap"><div class="card"><h1>☁️ Bubu AI V6 Cloud｜雲端同步工作台</h1><p>手機 / 電腦同步版。今日同步工作台會存到 Supabase，不再只存在單一裝置。</p><span id="cloudStatus" class="cloud">雲端連線中...</span></div><div class="grid"><div class="card"><h2>① 廠商原文</h2><label>廠商代碼</label><input id="vendorCode" value="BY"/><label>成本模式</label><select id="mode" onchange="updateAll()"><option value="taiwan">台灣 / 五分埔 NT成本</option><option value="korea">韓國 / S成本</option></select><label>商品分類</label><select id="category" onchange="parsedCategory=this.value==='auto'?parsedCategory:this.value;updateAll()"><option value="auto">AI自動判斷</option><option value="clothing">服飾</option><option value="skincare">保養品 / 彩妝</option><option value="life">生活用品</option></select><label>貼上廠商原文</label><textarea id="rawText" class="raw"></textarea><label><input id="autoAdd" type="checkbox" checked style="width:auto"/> AI整理完成後，自動加入雲端同步工作台</label><button id="parseBtn" class="btn ai" onclick="parseVendor()">✨ AI 自動整理商品</button></div><div class="card"><h2>② AI解析結果 / 可微調</h2><label>商品名稱</label><input id="productName" oninput="updateAll()"/><div id="clothingCostBox"><label>服飾成本 / 拿貨價</label><input id="clothingCost" type="number" oninput="updateAll()"/></div><div id="skincareCostBox" class="hidden"><label>保養品拿貨價</label><input id="skincareCost" type="number" oninput="updateAll()"/></div><div id="clothingFields"><label>顏色</label><input id="colors" oninput="updateAll()"/><label>規格</label><input id="specs" value="F" oninput="updateAll()"/><label>尺寸 / 規格補充</label><textarea id="sizeText" oninput="updateAll()"></textarea></div><div id="skincareFields" class="hidden"><label>容量 / 規格</label><input id="capacity" oninput="updateAll()"/><label>中文標籤｜用途</label><input id="labelPurpose" oninput="updateAll()"/><label>中文標籤｜保存期限</label><input id="labelExpiry" value="詳見產品外盒" oninput="updateAll()"/><label>中文標籤｜責任業者</label><input id="labelCompany" value="布布韓國工作室" oninput="updateAll()"/><label>中文標籤｜聯絡方式</label><input id="labelContact" value="@bubukorea" oninput="updateAll()"/><label>中文標籤｜產地</label><input id="labelOrigin" value="韓國" oninput="updateAll()"/><label>中文標籤｜使用方式 / 注意事項補充</label><textarea id="labelUsage" oninput="updateAll()"></textarea></div><div class="priceGrid"><div class="mini"><div class="k">落地成本</div><div id="landed" class="v">0</div></div><div class="mini"><div class="k">建議售價</div><div id="retail" class="v">0</div></div><div class="mini"><div class="k">建議批價</div><div id="wholesale" class="v">0</div></div></div></div></div><div class="card"><h2>③ 完整貼文預覽</h2><div id="fullPost" class="preview">請先貼廠商原文，按「AI 自動整理商品」。</div><button class="btn gray" onclick="copyPost()">📋 一鍵複製完整貼文</button></div><div id="labelCard" class="card hidden"><h2>④ 保養品中文標籤</h2><div id="labelPreview" class="preview"></div><button class="btn gray" onclick="copyLabel()">🏷️ 複製中文標籤</button></div><div class="card"><h2>⑤ 雲端同步工作台</h2><table><thead><tr><th>狀態</th><th>商品</th><th>售價</th><th>批價</th><th>成本</th><th>動作</th></tr></thead><tbody id="taskBody"></tbody></table></div></div><script>
const SUPABASE_URL='https://xkjayekdbezakvnyjvwu.supabase.co';
const SUPABASE_KEY='sb_publishable_6arvG__i8D6QAuP3MgV_7A_cmjmxzg_';
const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let currentCopy='',parsedCategory='clothing',lastAutoAddedKey='',tasks=[];
const get=id=>document.getElementById(id),val=id=>get(id).value.trim(),set=(id,v)=>get(id).value=v||'';
const ceil10=n=>Math.ceil((Number(n)||0)/10)*10,money=n=>'NT$'+Math.round(Number(n)||0).toLocaleString();
function cloud(text,ok=true){get('cloudStatus').textContent=text;get('cloudStatus').classList.toggle('bad',!ok)}
function cleanText(v,mode='line'){let t=String(v||'').replace(/\\n/g,'\n').replace(/\r\n/g,'\n');return mode==='space'?t.replace(/\s+/g,' ').trim():t.replace(/\n{3,}/g,'\n\n').trim()}
function detectCategory(){const s=val('category');return s!=='auto'?s:(parsedCategory||'clothing')}function getCost(){return Number(detectCategory()==='skincare'?val('skincareCost'):val('clothingCost'))||0}
function calcPrices(){const mode=val('mode'),cat=detectCategory(),cost=getCost();let landed=0,retail=0,wholesale=0;if(mode==='taiwan'){landed=cost+10;if(cost<=120){retail=ceil10(cost+80);wholesale=ceil10(cost+50)}else if(cost<=180){retail=ceil10(cost+100);wholesale=ceil10(cost+70)}else if(cost<=260){retail=ceil10(cost+130);wholesale=ceil10(cost+90)}else{retail=ceil10(cost+160);wholesale=ceil10(cost+110)}}else{landed=Math.ceil(cost*1.27);if(cat==='skincare'||cat==='life'){retail=ceil10(landed+90);wholesale=ceil10(landed+45)}else{retail=ceil10(landed+160);wholesale=ceil10(landed+90)}}return{landed,retail,wholesale,cost,cat}}
function switchMode(){const skin=detectCategory()==='skincare';get('clothingFields').classList.toggle('hidden',skin);get('clothingCostBox').classList.toggle('hidden',skin);get('skincareFields').classList.toggle('hidden',!skin);get('skincareCostBox').classList.toggle('hidden',!skin);get('labelCard').classList.toggle('hidden',!skin)}
function updateAll(){const p=calcPrices();get('landed').textContent=money(p.landed);get('retail').textContent=money(p.retail);get('wholesale').textContent=money(p.wholesale);switchMode();const vendor=val('vendorCode'),name=val('productName'),title=vendor&&name&&!name.startsWith(vendor+'｜')?vendor+'｜'+name:(name||''),copy=cleanText(currentCopy)||'文案生成中或尚未生成。';let full='';if(p.cat==='skincare'){const cap=val('capacity')||'依實際包裝標示';full=`${title}\n\n價格：${p.retail}\n規格：${cap}\n\n——————————\n\n${copy}`;updateLabelPreview(title)}else{const colors=val('colors')||'單一色',specs=val('specs')||'F',size=cleanText(val('sizeText'));full=`${title}\n\n顏色：${colors}\n規格：${specs}\n價格：${p.retail}\n\n${size?'📏 尺寸（平量cm）\n'+size+'\n':''}——————————\n\n${copy}`}get('fullPost').textContent=cleanText(full)}
function updateLabelPreview(title){get('labelPreview').textContent=cleanText(`${title||val('productName')}\n${val('capacity')||'依實際包裝標示'}｜${val('labelOrigin')||'韓國'}\n用途：${val('labelPurpose')||'日常保養／清潔使用'}\n保存期限：${val('labelExpiry')||'詳見產品外盒'}\n責任業者：${val('labelCompany')||'布布韓國工作室'}\n聯絡方式：${val('labelContact')||'@bubukorea'}${val('labelUsage')?'\n\n'+cleanText(val('labelUsage')):''}`)}
async function parseVendor(){const rawText=val('rawText');if(!rawText){alert('請先貼上廠商原文');return}const btn=get('parseBtn');btn.disabled=true;btn.textContent='AI整理中...';try{const res=await fetch('/api/parse-vendor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rawText,vendorCode:val('vendorCode'),selectedCategory:val('category'),mode:val('mode')})});const data=await res.json();if(!res.ok)throw new Error(data.error||'解析失敗');parsedCategory=data.category||'clothing';set('productName',cleanText(data.productName,'space'));set('colors',cleanText(data.colors||'單一色','space'));set('specs',cleanText(data.specs||'F','space'));set('sizeText',cleanText(data.sizeText));set('capacity',cleanText(data.capacity||data.specs||'','space'));if(parsedCategory==='skincare')set('skincareCost',data.cost||'');else set('clothingCost',data.cost||'');set('labelPurpose',cleanText(data.labelPurpose,'space'));set('labelExpiry',cleanText(data.labelExpiry||'詳見產品外盒','space'));set('labelCompany',cleanText(data.labelCompany||'布布韓國工作室','space'));set('labelContact',cleanText(data.labelContact||'@bubukorea','space'));set('labelOrigin',cleanText(data.labelOrigin||'韓國','space'));set('labelUsage',cleanText(data.labelUsage));currentCopy=cleanText(data.copy);updateAll();if(get('autoAdd').checked){const key=val('vendorCode')+'|'+val('productName')+'|'+getCost();if(key!==lastAutoAddedKey){await addTask(true);lastAutoAddedKey=key}}}catch(e){currentCopy='解析失敗：'+e.message+'\n請確認 Vercel 的 OPENAI_API_KEY 已設定。';updateAll()}finally{btn.disabled=false;btn.textContent='✨ AI 自動整理商品'}}
async function loadTasks(){try{const {data,error}=await supabaseClient.from('tasks').select('*').order('created_at',{ascending:false});if(error)throw error;tasks=(data||[]).map(r=>({id:r.id,...JSON.parse(r.content)}));renderTasks();cloud('☁️ 雲端已同步',true)}catch(e){cloud('雲端讀取失敗：'+e.message,false)}}
async function addTask(silent=false){const p=calcPrices(),vendor=val('vendorCode'),name=val('productName');if(!name){if(!silent)alert('沒有商品名稱');return}const title=vendor&&!name.startsWith(vendor+'｜')?vendor+'｜'+name:name;if(tasks.some(t=>t.title===title&&String(t.cost)===String(p.cost)&&!t.done)){if(!silent)alert('工作台已有這件商品');return}const item={done:false,title,retail:p.retail,wholesale:p.wholesale,cost:p.cost,time:new Date().toLocaleString()};const {error}=await supabaseClient.from('tasks').insert({content:JSON.stringify(item)});if(error){alert('雲端新增失敗：'+error.message);return}await loadTasks()}
async function toggleTask(i){const t=tasks[i],u={...t,done:!t.done};delete u.id;const {error}=await supabaseClient.from('tasks').update({content:JSON.stringify(u)}).eq('id',t.id);if(error){alert('更新失敗：'+error.message);return}await loadTasks()}
async function deleteTask(i){const {error}=await supabaseClient.from('tasks').delete().eq('id',tasks[i].id);if(error){alert('刪除失敗：'+error.message);return}await loadTasks()}
function renderTasks(){get('taskBody').innerHTML=tasks.map((t,i)=>`<tr><td><span class="pill ${t.done?'done':''}">${t.done?'✅ 已同步':'⏳ 未同步'}</span></td><td>${t.title}<br><span style="font-size:12px;color:#64748b">${t.time||''}</span></td><td>${t.retail}</td><td><b>${t.wholesale}</b></td><td>${t.cost}</td><td><button class="btn small" onclick="toggleTask(${i})">✔ 已同步</button> <button class="btn small red" onclick="deleteTask(${i})">刪除</button></td></tr>`).join('')}
function copyPost(){navigator.clipboard.writeText(get('fullPost').innerText).then(()=>alert('已複製完整貼文'))}function copyLabel(){navigator.clipboard.writeText(get('labelPreview').innerText).then(()=>alert('已複製中文標籤'))}
supabaseClient.channel('tasks-changes').on('postgres_changes',{event:'*',schema:'public',table:'tasks'},()=>loadTasks()).subscribe();loadTasks();updateAll();
</script></body></html>
