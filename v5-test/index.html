<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bubu AI V5 Test</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:#f3f4f6;color:#0f172a}.wrap{max-width:1320px;margin:0 auto;padding:24px}.card{background:#fff;border-radius:24px;padding:24px;margin-bottom:22px;box-shadow:0 14px 35px rgba(15,23,42,.10)}h1{margin:0 0 8px;font-size:32px;font-weight:900}h2{margin:0 0 16px;font-size:24px;font-weight:900}p{color:#64748b;line-height:1.7;margin:0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}label{display:block;margin:16px 0 8px;font-weight:900}input,select,textarea{width:100%;border:1px solid #dbe3ef;border-radius:15px;padding:14px 15px;font-size:16px;font-family:inherit;outline:none}textarea{min-height:110px;resize:vertical;line-height:1.65}.raw{min-height:260px}.btn{width:100%;border:0;border-radius:16px;padding:15px 18px;margin-top:14px;background:#111827;color:white;font-size:17px;font-weight:900;cursor:pointer}.btn.ai{background:linear-gradient(135deg,#7c3aed,#ec4899)}.btn.green{background:#059669}.btn.gray{background:#475569}.btn:disabled{opacity:.6}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}.box{white-space:pre-wrap;background:#faf5ff;border:1px solid #e9d5ff;border-radius:18px;padding:18px;line-height:1.8;min-height:170px}.small{font-size:13px;color:#64748b;margin-top:6px}.priceGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:16px 0}.mini{border-radius:18px;padding:18px;background:#f8fafc}.mini .k{font-size:13px;color:#64748b;font-weight:800}.mini .v{font-size:26px;font-weight:900;margin-top:4px}table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden}th,td{border-bottom:1px solid #e5e7eb;padding:12px;text-align:left;font-size:14px;vertical-align:top}th{background:#f8fafc;font-weight:900}.pill{display:inline-block;border-radius:999px;padding:6px 10px;background:#fef3c7;color:#92400e;font-size:12px;font-weight:900}.done{background:#dcfce7;color:#166534}.copybtn{border:0;border-radius:10px;padding:8px 10px;background:#111827;color:white;font-weight:800;cursor:pointer}@media(max-width:900px){.wrap{padding:14px}.grid,.two,.priceGrid{grid-template-columns:1fr}h1{font-size:26px}}
</style>
</head>
<body>
<div class="wrap">
<div class="card"><h1>Bubu AI V5 Test｜AI上架工作台</h1><p>貼整篇廠商文，AI 自動拆商品、算價格、產生愛+1格式與文案，並加入今日後台同步表。</p></div>
<div class="grid">
<div class="card"><h2>① 廠商原文貼上區</h2>
<label>廠商代碼</label><input id="vendorCode" placeholder="例如：MK、BC、BA" value="MK">
<label>進貨模式</label><select id="mode" onchange="recalculate()"><option value="korea">韓國 / S成本</option><option value="taiwan">台灣 / NT成本</option></select>
<label>商品類型</label><select id="category" onchange="recalculate()"><option value="auto">AI自動判斷</option><option value="clothing">服飾</option><option value="skincare">保養品 / 彩妝</option><option value="life">生活用品</option></select>
<label>貼上廠商原文</label><textarea id="rawText" class="raw" placeholder="整篇廠商文直接貼這裡..."></textarea>
<button id="parseBtn" class="btn ai" onclick="parseVendor()">✨ AI 自動整理商品</button><div class="small">V5測試版：一次先處理一件商品。</div></div>
<div class="card"><h2>② AI解析結果 / 可微調</h2>
<div class="two"><div><label>商品名稱</label><input id="productName" oninput="recalculate()"></div><div><label>成本</label><input id="cost" type="number" oninput="recalculate()"></div></div>
<label>顏色</label><input id="colors" oninput="updatePreview()"><label>規格</label><input id="specs" value="F" oninput="updatePreview()"><label>尺寸 / 規格補充</label><textarea id="sizeText" oninput="updatePreview()"></textarea>
<div class="priceGrid"><div class="mini"><div class="k">落地成本</div><div id="landed" class="v">NT$0</div></div><div class="mini"><div class="k">建議售價</div><div id="retail" class="v">NT$0</div></div><div class="mini"><div class="k">建議批價</div><div id="wholesale" class="v">NT$0</div></div></div>
<button class="btn green" onclick="addToTasks()">加入今日同步工作台</button></div></div>
<div class="grid"><div class="card"><h2>③ 愛+1 上架格式</h2><div id="listingBox" class="box"></div><button class="btn gray" onclick="copyText('listingBox')">複製愛+1格式</button></div><div class="card"><h2>④ AI文案預覽</h2><div id="copyBox" class="box">請先貼廠商原文，按「AI 自動整理商品」。</div><button class="btn gray" onclick="copyText('copyBox')">複製文案</button></div></div>
<div class="card"><h2>⑤ 今日後台同步表</h2><p style="margin-bottom:14px">去愛+1後台改批發價格，改完就按「已同步」。</p><table><thead><tr><th>狀態</th><th>商品</th><th>售價</th><th>批價</th><th>廠商代碼</th><th>動作</th></tr></thead><tbody id="taskBody"></tbody></table></div>
</div>
<script>
let parsedCategory="clothing";let taskList=JSON.parse(localStorage.getItem("bubu_v5_tasks")||"[]");
function money(n){return"NT$"+Math.round(Number(n)||0).toLocaleString()}function ceil10(n){return Math.ceil((Number(n)||0)/10)*10}function getVal(id){return document.getElementById(id).value.trim()}function setVal(id,v){document.getElementById(id).value=v||""}
function calcPrices(){const mode=getVal("mode");let cat=getVal("category");if(cat==="auto")cat=parsedCategory||"clothing";const cost=Number(getVal("cost"))||0;let landed=0,retail=0,wholesale=0;if(mode==="korea"){landed=Math.ceil(cost*1.27);if(cat==="life"){retail=ceil10(landed+90);wholesale=ceil10(landed+45)}else if(cat==="skincare"){retail=ceil10(landed+90);wholesale=ceil10(landed+40)}else{retail=ceil10(landed+160);wholesale=ceil10(landed+90)}}else{landed=Math.ceil(cost+10);retail=ceil10((landed+54)/0.8);wholesale=ceil10((landed+40)/0.85)}return{landed,retail,wholesale,cat}}
function recalculate(){const p=calcPrices();document.getElementById("landed").textContent=money(p.landed);document.getElementById("retail").textContent=money(p.retail);document.getElementById("wholesale").textContent=money(p.wholesale);updatePreview()}
function updatePreview(){const p=calcPrices();const vendor=getVal("vendorCode");const name=getVal("productName");const title=vendor?`${vendor}｜${name}`:name;const colors=getVal("colors")||"單一色";const specs=getVal("specs")||"F";const size=getVal("sizeText");document.getElementById("listingBox").textContent=`${title}\n顏色：${colors}\n規格：${specs}\n價格：${p.retail}\n\n${size?"📏 尺寸（平量cm）\n"+size:""}`}
async function parseVendor(){const rawText=getVal("rawText");if(!rawText){alert("請先貼上廠商原文");return}const btn=document.getElementById("parseBtn");btn.disabled=true;btn.textContent="AI整理中...";try{const res=await fetch("/api/parse-vendor",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({rawText,vendorCode:getVal("vendorCode"),mode:getVal("mode"),selectedCategory:getVal("category")})});const data=await res.json();if(!res.ok)throw new Error(data.error||"AI解析失敗");parsedCategory=data.category||"clothing";setVal("productName",data.productName||"");setVal("colors",data.colors||"");setVal("specs",data.specs||"F");setVal("sizeText",data.sizeText||"");setVal("cost",data.cost||"");recalculate();document.getElementById("copyBox").textContent=data.copy||""}catch(e){document.getElementById("copyBox").textContent="解析失敗："+e.message+"\n請確認 Vercel 環境變數 OPENAI_API_KEY 已設定。"}finally{btn.disabled=false;btn.textContent="✨ AI 自動整理商品"}}
function addToTasks(){const p=calcPrices();const vendor=getVal("vendorCode");const name=getVal("productName");if(!name){alert("沒有商品名稱");return}taskList.unshift({status:"未同步",vendor,product:vendor?`${vendor}｜${name}`:name,retail:p.retail,wholesale:p.wholesale,time:new Date().toLocaleString()});localStorage.setItem("bubu_v5_tasks",JSON.stringify(taskList));renderTasks()}
function markDone(i){taskList[i].status="已同步";localStorage.setItem("bubu_v5_tasks",JSON.stringify(taskList));renderTasks()}function deleteTask(i){taskList.splice(i,1);localStorage.setItem("bubu_v5_tasks",JSON.stringify(taskList));renderTasks()}
function renderTasks(){document.getElementById("taskBody").innerHTML=taskList.map((t,i)=>`<tr><td><span class="pill ${t.status==="已同步"?"done":""}">${t.status==="已同步"?"✅ 已同步":"⏳ 未同步"}</span></td><td>${t.product}<br><span class="small">${t.time||""}</span></td><td>${t.retail}</td><td><b>${t.wholesale}</b></td><td>${t.vendor||""}</td><td><button class="copybtn" onclick="markDone(${i})">✔ 已同步</button> <button class="copybtn" style="background:#991b1b" onclick="deleteTask(${i})">刪除</button></td></tr>`).join("")}
function copyText(id){navigator.clipboard.writeText(document.getElementById(id).innerText).then(()=>alert("已複製"))}
renderTasks();recalculate();
</script>
</body></html>
